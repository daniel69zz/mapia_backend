# ============================================================
# Mapia Backend - despliegue con Docker Compose
#
# Base de datos: 100% Supabase (configurada en .env).
# No se levanta Postgres local. La API lee TODA su configuracion
# de .env (env_file); aqui solo se sobreescribe lo del entorno.
#
# Arrancar:   docker compose up -d --build
# Logs:       docker compose logs -f api
# Parar:      docker compose down
# ============================================================
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapia_api
    restart: unless-stopped
    # Carga todas las variables desde .env (incluida la conexion a Supabase)...
    env_file:
      - .env
    # ...y sobreescribe solo lo especifico del despliegue.
    environment:
      NODE_ENV: production
      PORT: 3000
      # Vertex AI: usa la cuenta de servicio montada abajo (ADC por archivo).
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials.json
    ports:
      - '3000:3001'
    volumes:
      # Credencial de Vertex AI (solo lectura). Debe existir en el host.
      # Si NO usas Vertex (AI_VISION_ENABLED=false), puedes borrar esta linea.
      - ./gcp-credentials.json:/run/secrets/gcp-credentials.json:ro
      # Persiste archivos cuando STORAGE_DRIVER=local
      - mapia_uploads:/app/uploads

volumes:
  mapia_uploads:
